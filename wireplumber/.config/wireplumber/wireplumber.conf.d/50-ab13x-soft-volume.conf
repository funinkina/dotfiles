monitor.alsa.rules = [
  {
    # AB13X hardware mixer has only 45 dB range and floors at -45 dB, so low
    # PipeWire volumes hit a dead zone / cut off. ACP owns the hw mixer and
    # ignores soft-mixer, so disable ACP for this card and do volume in
    # software (float, full range, smooth fade to 0). Pin hw PCM to 0 dB once
    # with: sudo alsactl store  (so boot/hotplug restore keeps full headroom).
    matches = [
      { device.name = "~alsa_card.usb-Generic_AB13X_USB_Audio.*" }
    ]
    actions = {
      update-props = {
        api.alsa.use-acp = false
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_output.usb-Generic_AB13X_USB_Audio.*playback.*" }
    ]
    actions = {
      update-props = {
        api.alsa.soft-mixer = true
        node.description = "Wired USB Earphones"
        node.nick        = "Wired USB Earphones"
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_input.usb-Generic_AB13X_USB_Audio.*capture.*" }
    ]
    actions = {
      update-props = {
        node.description = "Wired USB Microphone"
        node.nick        = "Wired USB Microphone"
      }
    }
  }
]
