<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- Map Apple system font CSS keywords →  SF Pro   -->
  <alias binding="strong">
    <family>-apple-system</family>
    <prefer><family>SF Pro Text</family></prefer>
  </alias>

  <alias binding="strong">
    <family>BlinkMacSystemFont</family>
    <prefer><family>SF Pro Text</family></prefer>
  </alias>

  <alias binding="strong">
    <family>.AppleSystemUIFont</family>
    <prefer><family>SF Pro Text</family></prefer>
  </alias>

  <alias binding="strong">
    <family>.SF NS  </family>
    <prefer><family>SF Pro Text</family></prefer>
  </alias>

  <alias binding="strong">
    <family>.SF NS  </family>
    <prefer><family>SF Pro Text</family></prefer>
  </alias>

  <!-- Also alias the generic "system-ui" CSS keyword -->
  <alias binding="strong">
    <family>system-ui</family>
    <prefer><family>SF Pro Text</family></prefer>
  </alias>

</fontconfig>
